<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Princess Light Media</title>
  <link rel="icon" type="image/x-icon" href="/public/favicon.ico">
  <link rel="canonical" href="https://princesslight.com" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://princesslight.com" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Syne:wght@400;500;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">

  <style>
    :root {
      --ink: #0d0d0d;
      --paper: #f4f0e8;
      --cream: #faf7f2;
      --hot: #ff3c2f;
      --gold: #f5c842;
      --muted: #6b6560;
      --border: #2a2a2a;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      background: var(--ink);
      color: var(--paper);
      font-family: 'DM Sans', sans-serif;
      font-size: 17px;
      line-height: 1.65;
      overflow-x: hidden;
    }

    /* NOISE OVERLAY */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.05'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 999;
      opacity: 0.3;
    }

    /* STICKY BAR */
    .sticky-bar {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 900;
      background: var(--hot);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 2rem;
      padding: 0.55rem 1.5rem;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.8rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    .sticky-bar a { color: #fff; text-decoration: none; display: flex; align-items: center; gap: 0.4rem; transition: opacity 0.2s; }
    .sticky-bar a:hover { opacity: 0.8; }
    .sticky-bar .div { color: rgba(255,255,255,0.35); }

    /* NAV */
    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.3rem 5vw;
      margin-top: 36px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
    }
    .logo { font-family: 'Bebas Neue', sans-serif; font-size: 1.45rem; letter-spacing: 0.12em; color: var(--gold); text-decoration: none; }
    .logo span { color: rgba(244,240,232,0.5); }
    nav ul { list-style: none; display: flex; gap: 2rem; }
    nav ul a { font-family: 'Syne', sans-serif; font-size: 0.76rem; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: rgba(244,240,232,0.55); text-decoration: none; transition: color 0.2s; }
    nav ul a:hover { color: var(--gold); }
    .nav-cta { background: var(--hot) !important; color: #fff !important; padding: 0.45rem 1.1rem; border-radius: 2px; }

    /* HERO */
    .hero { padding: 6rem 5vw 5rem; position: relative; overflow: hidden; }
    .hero::after {
      content: 'PRINCESS LIGHT';
      position: absolute; bottom: -0.05em; right: -0.02em;
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(5rem, 16vw, 18rem);
      color: rgba(255,255,255,0.022);
      line-height: 1; pointer-events: none; white-space: nowrap;
    }
    .hero-tag {
      display: inline-flex; align-items: center; gap: 0.5rem;
      font-family: 'Syne', sans-serif; font-size: 0.73rem; font-weight: 700;
      letter-spacing: 0.15em; text-transform: uppercase; color: var(--gold); margin-bottom: 1.4rem;
    }
    .hero-tag::before { content: ''; display: block; width: 22px; height: 2px; background: var(--gold); }
    .hero h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(3.2rem, 8.5vw, 8.5rem);
      line-height: 0.92; letter-spacing: 0.01em;
      max-width: 14ch; margin-bottom: 1.8rem;
    }
    .hero h1 em { font-style: normal; color: var(--hot); }
    .hero h1 .gold { color: var(--gold); }
    .hero-sub { font-size: clamp(0.95rem, 1.8vw, 1.18rem); color: rgba(244,240,232,0.7); max-width: 52ch; line-height: 1.75; margin-bottom: 2.8rem; }
    .hero-sub strong { color: var(--paper); font-weight: 500; }

    .hero-actions { display: flex; flex-wrap: wrap; gap: 1rem; align-items: center; margin-bottom: 4rem; }
    .btn-primary {
      background: var(--hot); color: #fff;
      font-family: 'Syne', sans-serif; font-weight: 800; font-size: 0.88rem;
      letter-spacing: 0.06em; text-transform: uppercase; text-decoration: none;
      padding: 0.95rem 2rem; border-radius: 2px; display: inline-flex; align-items: center; gap: 0.5rem;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 4px 4px 0 var(--gold);
    }
    .btn-primary:hover { transform: translate(-2px,-2px); box-shadow: 6px 6px 0 var(--gold); }
    .btn-secondary {
      font-family: 'Syne', sans-serif; font-weight: 600; font-size: 0.83rem;
      letter-spacing: 0.06em; text-transform: uppercase; color: var(--paper); text-decoration: none;
      border-bottom: 2px solid var(--gold); padding-bottom: 2px; transition: color 0.2s;
    }
    .btn-secondary:hover { color: var(--gold); }

    .hero-proof { display: flex; flex-wrap: wrap; gap: 2.5rem; }
    .proof-item { display: flex; flex-direction: column; gap: 0.12rem; }
    .proof-num { font-family: 'Bebas Neue', sans-serif; font-size: 2.6rem; line-height: 1; color: var(--gold); }
    .proof-label { font-size: 0.76rem; color: rgba(244,240,232,0.45); font-family: 'Syne', sans-serif; letter-spacing: 0.06em; text-transform: uppercase; }
  </style>
</head>
<body>

<!-- STICKY BAR -->
<div class="sticky-bar">
</div>


<!-- ════════════════════ HERO ════════════════════ -->
<section class="hero">
  <div class="hero-tag">You were here</div>
  <h1>You were here</h1>
  <p class="hero-sub">
    Happy?
  </p>
</section>
</body>
</html>
